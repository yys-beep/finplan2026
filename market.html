<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPlan - Market Insights</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if (!localStorage.getItem('finplan_session')) { window.location.href = 'login.html'; }
        if (localStorage.getItem('finplan_theme') === 'dark') { document.documentElement.classList.add('dark-mode'); }
    </script>
</head>
<body class="finplan-gradient-bg d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-forestgreen shadow-sm py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold d-flex align-items-center mb-0" href="dashboard.html">
            <i class="fa-solid fa-leaf me-2"></i>FinPlan
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="theme-pill d-flex align-items-center px-3">
                <i class="fa-solid fa-sun nav-icon me-2"></i>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="themeToggle" style="cursor:pointer; width: 2em;">
                </div>
                <i class="fa-solid fa-moon nav-icon ms-2"></i>
            </div>
            <button id="logoutBtn" class="btn btn-pill-logout py-1 px-3">
                <i class="fa-solid fa-right-from-bracket me-1 small"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2 class="fw-bold profile-header">Market Insights</h2>
            <p class="text-muted">Live financial news tailored to your interests.</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-3">
            <div class="row g-2 align-items-center">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="searchNews" class="form-control border-start-0 ps-0" placeholder="Search markets, stocks, or trends...">
                    </div>
                </div>
                <div class="col-md-4">
                    <select id="categoryFilter" class="form-select">
                        <option value="finance" selected>All Finance</option>
                        <option value="technology">Tech Stocks</option>
                        <option value="real estate">Real Estate</option>
                        <option value="crypto">Cryptocurrency</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="newsList" class="row g-4">
        </div>
</div>

<footer class="text-center py-4 text-muted border-top bg-white mt-auto">
    <small>&copy; 2026 FinPlan - Web Programming Assignment</small>
</footer>

<script src="js/market.js"></script>
</body>
</html>
