<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPlan - Goals</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Security & Theme Check
        if (!localStorage.getItem('finplan_session')) { window.location.href = 'login.html'; }
        if (localStorage.getItem('finplan_theme') === 'dark') { document.documentElement.classList.add('dark-mode'); }
    </script>
</head>
<body class="finplan-gradient-bg d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-forestgreen shadow-sm py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold d-flex align-items-center mb-0" href="dashboard.html">
            <i class="fa-solid fa-leaf me-2"></i>FinPlan
        </a>
        <div class="d-flex align-items-center gap-3">
            <div class="theme-pill d-flex align-items-center px-3">
                <i class="fa-solid fa-sun nav-icon me-2"></i>
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="themeToggle" style="cursor:pointer; width: 2em;">
                </div>
                <i class="fa-solid fa-moon nav-icon ms-2"></i>
            </div>
            <button id="logoutBtn" class="btn btn-pill-logout py-1 px-3">
                <i class="fa-solid fa-right-from-bracket me-1 small"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold profile-header">Investment Goal Planner</h2>
            <p class="text-muted">Plan your future by setting specific financial targets.</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-5">
        <div class="card-body p-4">
            <h6 class="text-uppercase fw-bold small mb-3 section-label">Step 1: Define Your Goal</h6>
            <form id="goalForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold field-label">Goal Title</label>
                        <input type="text" class="form-control" id="goalName" placeholder="e.g. New Laptop" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold field-label">Target Amount (RM)</label>
                        <input type="number" class="form-control" id="goalAmount" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold field-label">Target Date</label>
                        <input type="date" class="form-control" id="goalDate" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-forestgreen w-100 py-2">Add Goal</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <h4 class="fw-bold mb-4 profile-header">Your Active Goals</h4>
    <div id="goalList" class="row g-4">
        </div>
</div>

<footer class="text-center py-4 text-muted border-top bg-white mt-auto">
    <small>&copy; 2026 FinPlan - Web Programming Assignment</small>
</footer>

<script src="js/goals.js"></script>
</body>
</html>
